<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Freischule Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="logo">Freischule <span>Admin</span></div>
    <p class="login-sub">Melde dich mit deinem Admin-Account an</p>

    <form id="login-form">
      <label for="email">E-Mail</label>
      <input id="email" type="email" autocomplete="email" required placeholder="admin@freischule.info" />

      <label for="password">Passwort</label>
      <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••" />

      <button type="submit" id="login-btn">Anmelden</button>
      <p id="login-error" class="error hidden"></p>
    </form>

    <div id="service-status" class="service-status hidden">
      <div id="status-auth" class="status-item"></div>
      <div id="status-fs" class="status-item"></div>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = '…';
      errEl.classList.add('hidden');

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error ?? 'Login fehlgeschlagen';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Anmelden';
        return;
      }

      // Show service status briefly, then redirect
      const statusEl = document.getElementById('service-status');
      statusEl.classList.remove('hidden');
      document.getElementById('status-auth').innerHTML =
        `<span class="badge ${data.services.authService ? 'ok' : 'warn'}">
          AuthService ${data.services.authService ? '✓' : '✗'}
        </span>`;
      document.getElementById('status-fs').innerHTML =
        `<span class="badge ${data.services.freeSchool ? 'ok' : 'warn'}">
          FreeSchool ${data.services.freeSchool ? '✓' : '✗'}
        </span>`;

      setTimeout(() => { window.location.href = '/'; }, 800);
    });
  </script>
</body>
</html>
